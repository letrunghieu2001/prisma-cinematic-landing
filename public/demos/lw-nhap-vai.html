<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tình huống nhập vai ra quyết định — Trường học số</title>
<style>:root{--p:#0061af;--ph:#0d67f7;--ps:#f0f6fe;--ac:#ed1c24;--ink:#181d27;--ink2:#535862;--ink3:#717680;--bd:#e9eaeb;--sf:#fff;--cv:#fafafa;--r:12px;--sh:0 4px 12px rgba(16,24,40,.08);--f:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:var(--f);color:var(--ink);background:var(--cv);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%}
h1,h2,h3,h4{line-height:1.25;font-weight:700}
.app{min-height:100%;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex:none}
.bar .dot{width:20px;height:20px;border-radius:6px;background:var(--accent,var(--p));flex:none}
.bar .t{font-weight:600;font-size:14px}.bar .s{flex:1}.bar .tag{font-size:12px;color:var(--ink3)}
.btn{font:inherit;font-weight:600;cursor:pointer;border:none;border-radius:999px;padding:9px 16px;min-height:40px;background:var(--p);color:#fff;transition:background .15s,transform .1s}
.btn:hover{background:var(--ph)}.btn:active{transform:scale(.97)}.btn.g{background:var(--ps);color:var(--p)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--ps);color:var(--p)}
.body{flex:1;padding:18px;overflow:auto}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:root{--accent:#0061AF}
.wrap{max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.sit{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;box-shadow:var(--sh)}
.sit h3{color:#0061AF;margin-bottom:8px}.opt{display:block;width:100%;text-align:left;margin-top:8px;padding:12px 14px;border:2px solid var(--bd);border-radius:10px;background:#fff;cursor:pointer;font:inherit;transition:.2s}
.opt:hover{border-color:#0061AF}.opt.sel{border-color:#0061AF;background:#0061AF12}</style></head>
<body><div class="app">
<div class="bar"><span class="dot"></span><span class="t">Tình huống nhập vai ra quyết định</span><span class="s"></span><span class="tag">Trường học số</span></div>
<div class="body"><div class="wrap"><span class="badge">Nhập vai · GDCD 9</span><div class="sit" id="s"></div></div></div>
</div><script>var S=[{h:'Em thấy bạn chép bài trong giờ kiểm tra. Em sẽ?',o:['Lờ đi như không thấy','Nhắc bạn dừng lại sau giờ','Báo ngay cho giáo viên']},{h:'Nhặt được ví có tiền trước cổng trường. Em sẽ?',o:['Giữ lại cho mình','Nộp cho bảo vệ/nhà trường','Chia cho các bạn']}],i=0;
function show(){var s=S[i];document.getElementById('s').innerHTML='<h3>Tình huống '+(i+1)+'</h3><p style="color:var(--ink2);font-size:14px">'+s.h+'</p>'+s.o.map(function(o,k){return '<button class="opt" data-k="'+k+'">'+o+'</button>'}).join('');document.querySelectorAll('.opt').forEach(function(b){b.onclick=function(){document.querySelectorAll('.opt').forEach(function(x){x.classList.remove('sel')});b.classList.add('sel')}})}
show();var auto=0;setInterval(function(){var b=document.querySelectorAll('.opt');if(auto<b.length){b.forEach(function(x){x.classList.remove('sel')});b[auto].classList.add('sel');auto++}else{auto=0;i=(i+1)%S.length;show()}},1400);</script></body></html>
