<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đề kiểm tra 45 phút · Toán 8 — Trường học số</title>
<style>:root{--p:#0061af;--ph:#0d67f7;--ps:#f0f6fe;--ac:#ed1c24;--ink:#181d27;--ink2:#535862;--ink3:#717680;--bd:#e9eaeb;--sf:#fff;--cv:#fafafa;--r:12px;--sh:0 4px 12px rgba(16,24,40,.08);--f:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:var(--f);color:var(--ink);background:var(--cv);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%}
h1,h2,h3,h4{line-height:1.25;font-weight:700}
.app{min-height:100%;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex:none}
.bar .dot{width:20px;height:20px;border-radius:6px;background:var(--accent,var(--p));flex:none}
.bar .t{font-weight:600;font-size:14px}.bar .s{flex:1}.bar .tag{font-size:12px;color:var(--ink3)}
.btn{font:inherit;font-weight:600;cursor:pointer;border:none;border-radius:999px;padding:9px 16px;min-height:40px;background:var(--p);color:#fff;transition:background .15s,transform .1s}
.btn:hover{background:var(--ph)}.btn:active{transform:scale(.97)}.btn.g{background:var(--ps);color:var(--p)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--ps);color:var(--p)}
.body{flex:1;padding:18px;overflow:auto}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
html:not(.playing) *{animation-play-state:paused!important}
:root{--accent:#B93815}
.qz{max-width:600px;margin:0 auto}
.top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ring{width:46px;height:46px;flex:none}.qn{font-weight:600;color:var(--ink2)}.sc{margin-left:auto;font-weight:800;color:#B93815}
.q{font-size:18px;font-weight:700;margin:6px 0 16px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:16px;border-radius:12px;border:2px solid var(--bd);background:var(--sf);font-weight:600;text-align:left;cursor:pointer;transition:.2s}
.opt.correct{border-color:#067647;background:#EDFCF2;color:#067647}
.opt.wrong{border-color:#F04438;background:#FEF3F2;color:#B42318}
@media(max-width:460px){.opts{grid-template-columns:1fr}}</style></head>
<body><div class="app">
<div class="bar"><span class="dot"></span><span class="t">Đề kiểm tra 45 phút · Toán 8</span><span class="s"></span><span class="tag">Trường học số</span></div>
<div class="body"><div class="qz">
<div class="top"><svg class="ring" viewBox="0 0 46 46"><circle cx="23" cy="23" r="20" fill="none" stroke="#e9eaeb" stroke-width="5"/><circle id="rg" cx="23" cy="23" r="20" fill="none" stroke="#B93815" stroke-width="5" stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="0" transform="rotate(-90 23 23)"/></svg>
<span class="qn" id="qn">Câu 1/3</span><span class="sc" id="sc">0 điểm</span></div>
<div class="q" id="q"></div><div class="opts" id="opts"></div></div></div>
</div><script>var PLAY=false,_si=window.setInterval;
function loop(fn,ms){return _si(function(){if(PLAY)fn()},ms)}
function _play(){if(PLAY)return;PLAY=true;document.documentElement.classList.add('playing');document.dispatchEvent(new Event('ths-play'))}
function _pause(){PLAY=false;document.documentElement.classList.remove('playing')}
window.addEventListener('message',function(e){if(e.data==='play')_play();else if(e.data==='pause')_pause()});
if(location.search.indexOf('play')>=0){window.addEventListener('load',_play);_play()}
var Q=[{"q":"Kết quả của (x+3)² là?","o":["x²+9","x²+6x+9","x²+3x+9","x²+6x+3"],"a":1},{"q":"Phân tích x²−4 thành nhân tử:","o":["(x−2)(x+2)","(x−4)(x+1)","(x−2)²","x(x−4)"],"a":0},{"q":"Nghiệm của 2x−6=0 là:","o":["x=2","x=3","x=−3","x=6"],"a":1}],i=0,score=0,phase=0,t=0;
function render(){var q=Q[i];document.getElementById('qn').textContent='Câu '+(i+1)+'/'+Q.length;document.getElementById('q').textContent=q.q;var o=document.getElementById('opts');o.innerHTML='';q.o.forEach(function(op,k){var b=document.createElement('button');b.className='opt';b.textContent=op;b.dataset.k=k;o.appendChild(b)})}
render();
loop(function(){t=(t+1)%40;document.getElementById('rg').style.strokeDashoffset=(125.6*t/40)+'';},75);
function step(){phase++;var q=Q[i],btns=document.querySelectorAll('.opt');if(phase===1){btns[q.a].classList.add('correct');score+=10;document.getElementById('sc').textContent=score+' điểm'}else{phase=0;i=(i+1)%Q.length;if(i===0)score=0;render()}}
loop(step,1600);</script></body></html>
