<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dòng thời gian 1945–1975 (Lịch sử 9)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #1a1410; --card: #2a211a; --gold: #d4a24e; --cream: #f3ead9; --line: #574636; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--cream); min-height: 100vh;
    padding: clamp(0.75rem, 2vw, 1.5rem); display: flex; flex-direction: column; gap: 1rem;
  }
  h1 { font-size: clamp(1.1rem, 3.5vw, 1.6rem); color: var(--gold); text-align: center; }
  .rail-wrap { overflow-x: auto; padding: 1.5rem 0.5rem; }
  .rail { position: relative; display: flex; gap: 0; min-width: max-content; padding: 0 20px; }
  .rail::before { content: ""; position: absolute; top: 26px; left: 0; right: 0; height: 3px; background: var(--line); }
  .node { position: relative; display: flex; flex-direction: column; align-items: center; width: 120px; cursor: pointer; }
  .dot { width: 22px; height: 22px; border-radius: 50%; background: var(--card); border: 3px solid var(--gold); z-index: 2; transition: transform .15s, background .15s; }
  .node:hover .dot, .node.active .dot { background: var(--gold); transform: scale(1.25); }
  .node .year { margin-top: 0.5rem; font-weight: 800; color: var(--gold); font-size: 0.95rem; }
  .node .lbl { font-size: 0.72rem; text-align: center; opacity: .75; margin-top: 0.15rem; padding: 0 4px; }
  .detail { background: var(--card); border-radius: 1.25rem; padding: clamp(1.2rem, 4vw, 2rem); max-width: 640px; margin: 0 auto; width: 100%; border-left: 4px solid var(--gold); }
  .detail .y { color: var(--gold); font-size: 1.4rem; font-weight: 800; }
  .detail h2 { font-size: 1.2rem; margin: 0.3rem 0 0.6rem; }
  .detail p { line-height: 1.7; opacity: .92; }
  .nav { display: flex; gap: 0.75rem; justify-content: center; align-items: center; }
  button { font: inherit; font-weight: 700; cursor: pointer; border: none; border-radius: 999px; padding: 0.7rem 1.4rem; min-height: 48px; background: var(--gold); color: #2a211a; transition: transform .15s, opacity .15s; }
  button:hover { transform: scale(1.04); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .dots { display: flex; gap: 0.4rem; }
  .dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--line); }
  .dots span.on { background: var(--gold); }
</style>
</head>
<body>
  <h1>Dòng thời gian lịch sử Việt Nam 1945–1975</h1>
  <div class="rail-wrap"><div class="rail" id="rail"></div></div>
  <div class="detail" id="detail"></div>
  <div class="nav">
    <button id="prev">← Trước</button>
    <div class="dots" id="dots"></div>
    <button id="next">Sau →</button>
  </div>

<script>
  const EVENTS = [
    { year: "2/9/1945", title: "Tuyên ngôn Độc lập", text: "Tại Quảng trường Ba Đình, Chủ tịch Hồ Chí Minh đọc bản Tuyên ngôn Độc lập, khai sinh nước Việt Nam Dân chủ Cộng hòa — nhà nước công nông đầu tiên ở Đông Nam Á." },
    { year: "19/12/1946", title: "Toàn quốc kháng chiến", text: "Hưởng ứng Lời kêu gọi Toàn quốc kháng chiến của Chủ tịch Hồ Chí Minh, nhân dân cả nước bước vào cuộc kháng chiến chống thực dân Pháp." },
    { year: "7/5/1954", title: "Chiến thắng Điện Biên Phủ", text: "Chiến dịch Điện Biên Phủ toàn thắng, đập tan tập đoàn cứ điểm mạnh nhất của Pháp, tạo bước ngoặt kết thúc chiến tranh." },
    { year: "21/7/1954", title: "Hiệp định Genève", text: "Hiệp định Genève được ký kết, các nước cam kết tôn trọng độc lập, chủ quyền của Việt Nam; đất nước tạm thời chia làm hai miền." },
    { year: "1968", title: "Tổng tiến công Mậu Thân", text: "Cuộc Tổng tiến công và nổi dậy Xuân Mậu Thân 1968 giáng đòn mạnh vào ý chí xâm lược, buộc đối phương phải xuống thang chiến tranh." },
    { year: "12/1972", title: "Điện Biên Phủ trên không", text: "Quân và dân miền Bắc đánh bại cuộc tập kích đường không bằng máy bay B-52, làm nên chiến thắng \"Điện Biên Phủ trên không\"." },
    { year: "27/1/1973", title: "Hiệp định Paris", text: "Hiệp định Paris về chấm dứt chiến tranh, lập lại hòa bình ở Việt Nam được ký kết; quân đội nước ngoài rút khỏi miền Nam." },
    { year: "30/4/1975", title: "Giải phóng miền Nam", text: "Chiến dịch Hồ Chí Minh toàn thắng, miền Nam hoàn toàn giải phóng, non sông thu về một mối, mở ra kỷ nguyên độc lập, thống nhất." }
  ];
  let cur = 0;
  const rail = document.getElementById("rail");
  const dots = document.getElementById("dots");
  EVENTS.forEach((e, i) => {
    const n = document.createElement("div");
    n.className = "node"; n.tabIndex = 0;
    n.innerHTML = '<div class="dot"></div><div class="year">' + e.year + '</div><div class="lbl">' + e.title + '</div>';
    n.addEventListener("click", () => select(i));
    n.addEventListener("keydown", (ev) => { if (ev.key === "Enter") select(i); });
    rail.appendChild(n);
    const d = document.createElement("span"); dots.appendChild(d);
  });
  const detail = document.getElementById("detail");
  function select(i) {
    cur = i; const e = EVENTS[i];
    detail.innerHTML = '<div class="y">' + e.year + '</div><h2>' + e.title + '</h2><p>' + e.text + '</p>';
    document.querySelectorAll(".node").forEach((n, k) => n.classList.toggle("active", k === i));
    document.querySelectorAll(".dots span").forEach((s, k) => s.classList.toggle("on", k === i));
    document.getElementById("prev").disabled = i === 0;
    document.getElementById("next").disabled = i === EVENTS.length - 1;
    document.querySelectorAll(".node")[i].scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  }
  document.getElementById("prev").addEventListener("click", () => cur > 0 && select(cur - 1));
  document.getElementById("next").addEventListener("click", () => cur < EVENTS.length - 1 && select(cur + 1));
  addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && cur > 0) select(cur - 1);
    if (e.key === "ArrowRight" && cur < EVENTS.length - 1) select(cur + 1);
  });
  select(0);
</script>
</body>
</html>
