<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Podcast tóm tắt chương — Trường học số</title>
<style>:root{--p:#0061af;--ph:#0d67f7;--ps:#f0f6fe;--ac:#ed1c24;--ink:#181d27;--ink2:#535862;--ink3:#717680;--bd:#e9eaeb;--sf:#fff;--cv:#fafafa;--r:12px;--sh:0 4px 12px rgba(16,24,40,.08);--f:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:var(--f);color:var(--ink);background:var(--cv);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%}
h1,h2,h3,h4{line-height:1.25;font-weight:700}
.app{min-height:100%;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex:none}
.bar .dot{width:20px;height:20px;border-radius:6px;background:var(--accent,var(--p));flex:none}
.bar .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}.bar .s{flex:1;min-width:8px}.bar .tag{font-size:12px;color:var(--ink3);white-space:nowrap;flex:none}
html.nochrome .bar{display:none}
html.nochrome .body{padding:14px}
.btn{font:inherit;font-weight:600;cursor:pointer;border:none;border-radius:999px;padding:9px 16px;min-height:40px;background:var(--p);color:#fff;transition:background .15s,transform .1s}
.btn:hover{background:var(--ph)}.btn:active{transform:scale(.97)}.btn.g{background:var(--ps);color:var(--p)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--ps);color:var(--p)}
.body{flex:1;padding:18px;overflow:auto}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
html:not(.playing) *{animation-play-state:paused!important}
:root{--accent:#C11574}
.pl{max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.cover{aspect-ratio:1/1;max-width:200px;margin:0 auto;border-radius:16px;background:linear-gradient(135deg,#C11574,#fff);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.cover svg{width:64px;height:64px}
.meta{text-align:center}.meta h2{font-size:18px}.meta p{color:var(--ink3);font-size:13px}
.wave{display:flex;align-items:flex-end;gap:3px;height:64px;justify-content:center}
.wave i{width:5px;border-radius:3px;background:#C11574;opacity:.85;animation:eq 1.1s ease-in-out infinite}
@keyframes eq{0%,100%{height:12%}50%{height:100%}}
.ctrls{display:flex;align-items:center;gap:14px;justify-content:center}
.play{width:56px;height:56px;border-radius:50%;background:var(--p);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.prog{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink3)}
.track{flex:1;height:6px;border-radius:999px;background:var(--bd);overflow:hidden}.track>i{display:block;height:100%;background:var(--p);width:0}</style></head>
<body><div class="app">
<div class="bar"><span class="dot"></span><span class="t">Podcast tóm tắt chương</span><span class="s"></span><span class="tag">Trường học số</span></div>
<div class="body"><div class="pl">
<div class="cover"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
<div class="meta"><h2>Podcast tóm tắt chương</h2><p>Ngữ văn 9 · Trường học số</p></div>
<div class="wave"><i style="animation-delay:0.00s"></i><i style="animation-delay:0.04s"></i><i style="animation-delay:0.09s"></i><i style="animation-delay:0.14s"></i><i style="animation-delay:0.18s"></i><i style="animation-delay:0.22s"></i><i style="animation-delay:0.27s"></i><i style="animation-delay:0.32s"></i><i style="animation-delay:0.36s"></i><i style="animation-delay:0.40s"></i><i style="animation-delay:0.45s"></i><i style="animation-delay:0.49s"></i><i style="animation-delay:0.54s"></i><i style="animation-delay:0.58s"></i><i style="animation-delay:0.63s"></i><i style="animation-delay:0.67s"></i><i style="animation-delay:0.72s"></i><i style="animation-delay:0.77s"></i><i style="animation-delay:0.81s"></i><i style="animation-delay:0.85s"></i><i style="animation-delay:0.90s"></i><i style="animation-delay:0.94s"></i><i style="animation-delay:0.99s"></i><i style="animation-delay:1.03s"></i><i style="animation-delay:1.08s"></i><i style="animation-delay:1.13s"></i><i style="animation-delay:1.17s"></i><i style="animation-delay:1.21s"></i><i style="animation-delay:1.26s"></i><i style="animation-delay:1.30s"></i><i style="animation-delay:1.35s"></i><i style="animation-delay:1.40s"></i><i style="animation-delay:1.44s"></i><i style="animation-delay:1.48s"></i><i style="animation-delay:1.53s"></i><i style="animation-delay:1.57s"></i><i style="animation-delay:1.62s"></i><i style="animation-delay:1.67s"></i><i style="animation-delay:1.71s"></i><i style="animation-delay:1.75s"></i><i style="animation-delay:1.80s"></i><i style="animation-delay:1.84s"></i><i style="animation-delay:1.89s"></i><i style="animation-delay:1.93s"></i><i style="animation-delay:1.98s"></i><i style="animation-delay:2.02s"></i></div>
<div class="prog"><span id="cur">0:00</span><div class="track"><i id="fill"></i></div><span>6:32</span></div>
<div class="ctrls"><button class="btn g" onclick="skip(-1)">‹‹ 10s</button>
<button class="play" id="pp" aria-label="Tạm dừng"><svg id="ppi" width="22" height="22" viewBox="0 0 24 24" fill="#fff"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg></button>
<button class="btn g" onclick="skip(1)">10s ››</button></div></div></div>
</div><script>var PLAY=false,_si=window.setInterval;
function loop(fn,ms){return _si(function(){if(PLAY)fn()},ms)}
function _play(){if(PLAY)return;PLAY=true;document.documentElement.classList.add('playing');document.dispatchEvent(new Event('ths-play'))}
function _pause(){PLAY=false;document.documentElement.classList.remove('playing')}
window.addEventListener('message',function(e){if(e.data==='play')_play();else if(e.data==='pause')_pause()});
if(location.search.indexOf('chrome=0')>=0)document.documentElement.classList.add('nochrome');
if(location.search.indexOf('play')>=0){window.addEventListener('load',_play);_play()}
var t=0,T=392,playing=true;
function fmt(s){s=Math.max(0,Math.floor(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function tick(){if(playing){t+=1;if(t>T)t=0;document.getElementById('cur').textContent=fmt(t);document.getElementById('fill').style.width=(t/T*100)+'%'}}
var iv=loop(tick,1000);
document.getElementById('pp').onclick=function(){playing=!playing;document.getElementById('ppi').innerHTML=playing?'<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>':'<path d="M7 5l12 7-12 7z"/>';document.querySelectorAll('.wave i').forEach(function(b){b.style.animationPlayState=playing?'running':'paused'})};
function skip(d){t=Math.min(T,Math.max(0,t+d*10));document.getElementById('cur').textContent=fmt(t);document.getElementById('fill').style.width=(t/T*100)+'%'}</script></body></html>
