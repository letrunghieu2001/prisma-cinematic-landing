<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz đấu trường · Tiếng Anh 6 — Trường học số</title>
<style>:root{--p:#0061af;--ph:#0d67f7;--ps:#f0f6fe;--ac:#ed1c24;--ink:#181d27;--ink2:#535862;--ink3:#717680;--bd:#e9eaeb;--sf:#fff;--cv:#fafafa;--r:12px;--sh:0 4px 12px rgba(16,24,40,.08);--f:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:var(--f);color:var(--ink);background:var(--cv);line-height:1.5;-webkit-font-smoothing:antialiased;height:100%}
h1,h2,h3,h4{line-height:1.25;font-weight:700}
.app{min-height:100%;display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex:none}
.bar .dot{width:20px;height:20px;border-radius:6px;background:var(--accent,var(--p));flex:none}
.bar .t{font-weight:600;font-size:14px}.bar .s{flex:1}.bar .tag{font-size:12px;color:var(--ink3)}
.btn{font:inherit;font-weight:600;cursor:pointer;border:none;border-radius:999px;padding:9px 16px;min-height:40px;background:var(--p);color:#fff;transition:background .15s,transform .1s}
.btn:hover{background:var(--ph)}.btn:active{transform:scale(.97)}.btn.g{background:var(--ps);color:var(--p)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--ps);color:var(--p)}
.body{flex:1;padding:18px;overflow:auto}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:root{--accent:#0061AF}
.qz{max-width:520px;margin:0 auto}.q{font-size:18px;font-weight:700;margin:8px 0 14px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:16px;border-radius:12px;border:none;color:#fff;font-weight:700;cursor:pointer}
.opt:nth-child(1){background:#e21b3c}.opt:nth-child(2){background:#1368ce}.opt:nth-child(3){background:#d89e00}.opt:nth-child(4){background:#26890c}
.opt.dim{opacity:.4}.top{display:flex;justify-content:space-between;font-weight:700;color:var(--ink2);margin-bottom:6px}
.sc{color:#0061AF}@media(max-width:440px){.opts{grid-template-columns:1fr}}</style></head>
<body><div class="app">
<div class="bar"><span class="dot"></span><span class="t">Quiz đấu trường · Tiếng Anh 6</span><span class="s"></span><span class="tag">Trường học số</span></div>
<div class="body"><div class="qz"><div class="top"><span id="qn">Câu 1/3</span><span class="sc" id="sc">0 điểm</span></div><div class="q" id="q"></div><div class="opts" id="o"></div></div></div>
</div><script>var Q=[{"q":"She ___ a student.","o":["am","is","are","be"],"a":1},{"q":"Plural of 'child'?","o":["childs","children","childes","child"],"a":1},{"q":"Opposite of 'big'?","o":["tall","small","long","wide"],"a":1}],i=0,sc=0,ph=0;
function render(){var q=Q[i];document.getElementById('qn').textContent='Câu '+(i+1)+'/'+Q.length;document.getElementById('q').textContent=q.q;var o=document.getElementById('o');o.innerHTML='';q.o.forEach(function(op){var b=document.createElement('button');b.className='opt';b.textContent=op;o.appendChild(b)})}
render();
function step(){ph++;var q=Q[i],b=document.querySelectorAll('.opt');if(ph===1){b.forEach(function(e,k){if(k!==q.a)e.classList.add('dim')});sc+=10;document.getElementById('sc').textContent=sc+' điểm'}else{ph=0;i=(i+1)%Q.length;if(i===0)sc=0;render()}}
setInterval(step,1500);</script></body></html>
